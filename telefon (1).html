<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SınıfCevap — Tarama</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
:root{
  --bg:#0d0f14;--surface:#151820;--card:#1c2030;--border:#252a3a;
  --accent:#4f8ef7;--green:#3dd68c;--yellow:#f7c948;--red:#f75f4f;
  --text:#e8ecf5;--muted:#6b7494;
  --A:#ef4444;--B:#3b82f6;--C:#22c55e;--D:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);
     height:100dvh;display:flex;flex-direction:column;overflow:hidden;}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);
  padding:9px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{font-weight:900;font-size:14px;color:var(--accent);}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);margin-left:auto;}
.conn-dot.ok{background:var(--green);}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:9px;}

/* ── DEDEKTÖR STATUS ── */
.cv-status{display:flex;align-items:center;gap:7px;padding:7px 11px;
  background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--muted);}
.cv-dot{width:7px;height:7px;border-radius:50%;background:var(--yellow);flex-shrink:0;}
.cv-dot.ready{background:var(--green);} .cv-dot.error{background:var(--red);}

/* ── SINIF + SORU ── */
.row2{display:grid;grid-template-columns:auto 1fr;gap:8px;align-items:start;}
.sec-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;}
.class-chips{display:flex;flex-wrap:wrap;gap:5px;}
.class-chip{padding:5px 11px;background:var(--card);border:1.5px solid var(--border);
  border-radius:7px;font-weight:700;font-size:12px;cursor:pointer;color:var(--text);}
.class-chip.active{border-color:var(--accent);background:rgba(79,142,247,.12);color:var(--accent);}
.q-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:8px 10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;}
.q-input:focus{outline:none;border-color:var(--accent);}

/* ── KAMERA ── */
.video-wrap{position:relative;background:#000;border-radius:10px;overflow:hidden;
  border:2px solid var(--border);}
#cam-video{width:100%;display:block;max-height:210px;object-fit:cover;}
#scan-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

/* ── KAM BUTONLAR ── */
.cam-row{display:flex;gap:7px;}
.btn{padding:8px 13px;border-radius:8px;border:none;font-family:'Outfit',sans-serif;
  font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
.btn-primary{background:var(--accent);color:white;}
.btn-stop{background:var(--red);color:white;}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border);}
.btn-green{background:var(--green);color:#0a1f10;flex:1;justify-content:center;font-size:14px;padding:11px;}
.btn-cancel{background:var(--card);color:var(--red);border:1px solid var(--red);
  flex:1;justify-content:center;font-size:13px;padding:10px;}

/* ── PROGRESS + AKSİYON ── */
.prog-action{display:flex;flex-direction:column;gap:7px;
  background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.prog-row{display:flex;align-items:center;gap:8px;}
.prog-wrap{flex:1;height:6px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s;}
.prog-text{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
.action-row{display:flex;gap:7px;}

/* ── DOĞRU CEVAP ── */
.correct-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 11px;}
.ca-btns{display:flex;gap:6px;margin-top:6px;}
.ca-btn{flex:1;height:40px;border-radius:8px;border:3px solid transparent;
  font-weight:900;font-size:16px;color:white;cursor:pointer;transition:all .15s;}
.ca-btn.A{background:var(--A);}.ca-btn.B{background:var(--B);}.ca-btn.C{background:var(--C);}.ca-btn.D{background:var(--D);}
.ca-btn.picked{border-color:white;transform:scale(1.07);}

/* ── MANUEL GİRİŞ (açılır-kapanır) ── */
.manual-toggle{display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:9px 12px;cursor:pointer;user-select:none;}
.manual-toggle .lbl{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;}
.manual-toggle .arrow{font-size:11px;color:var(--muted);transition:transform .2s;}
.manual-toggle.open .arrow{transform:rotate(180deg);}
.manual-body{display:none;background:var(--card);border:1px solid var(--border);
  border-top:none;border-radius:0 0 10px 10px;padding:9px 11px;margin-top:-1px;}
.manual-body.open{display:block;}
.manual-row{display:flex;gap:6px;align-items:center;}
.sel{background:var(--surface);border:1px solid var(--border);border-radius:7px;
  padding:7px 8px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;flex:1;min-width:0;}
.ans-btn{width:36px;height:36px;border-radius:7px;border:none;font-weight:900;font-size:14px;color:white;cursor:pointer;}
.ans-btn.A{background:var(--A);}.ans-btn.B{background:var(--B);}.ans-btn.C{background:var(--C);}.ans-btn.D{background:var(--D);}

/* ── TARANAN CEVAPLAR (altta) ── */
.det-section{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.det-header{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.det-header .lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;}
.det-clear{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'Outfit',sans-serif;}
.det-list{max-height:160px;overflow-y:auto;}
.det-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border);font-size:12px;}
.det-row:last-child{border-bottom:none;}
.ans-chip{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:11px;color:white;flex-shrink:0;}
.chip-A{background:var(--A);}.chip-B{background:var(--B);}.chip-C{background:var(--C);}.chip-D{background:var(--D);}

/* ── DEBUG ── */
#debug-panel{background:#1a0a00;border:1px solid #f59e0b;border-radius:8px;padding:7px 11px;
  font-size:10px;color:#f59e0b;font-family:'JetBrains Mono',monospace;
  max-height:100px;overflow-y:auto;line-height:1.6;display:none;}
.debug-toggle{text-align:center;padding:4px;font-size:11px;color:var(--muted);
  cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;width:100%;}

/* ── TOAST ── */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--green);color:#0d1a0f;padding:8px 16px;border-radius:9px;
  font-weight:700;font-size:13px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">📱 SınıfCevap</div>
  <div class="conn-dot" id="conn-dot"></div>
</div>

<div class="scroll">

  <!-- Dedektör durumu -->
  <div class="cv-status">
    <div class="cv-dot ready" id="cv-dot"></div>
    <span id="cv-text">ArUco dedektörü hazır ✓</span>
  </div>

  <!-- Sınıf + Soru -->
  <div>
    <div class="sec-label">Sınıf</div>
    <div class="class-chips" id="class-chips"><span style="font-size:12px;color:var(--muted)">Yükleniyor...</span></div>
  </div>
  <div>
    <div class="sec-label">Soru</div>
    <input type="text" class="q-input" id="qlabel" placeholder="Örn: Fen 3. Soru">
  </div>

  <!-- Kamera -->
  <div class="video-wrap">
    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="scan-canvas"></canvas>
  </div>
  <div class="cam-row">
    <button class="btn btn-primary" id="cam-start" onclick="startCam()">▶ Başlat</button>
    <button class="btn btn-stop" id="cam-stop" onclick="stopCam()" style="display:none">⏹ Durdur</button>
  </div>

  <!-- İlerleme + Kaydet/İptal -->
  <div class="prog-action">
    <div class="prog-row">
      <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-text" id="prog-text">0/0</div>
    </div>
    <div class="action-row">
      <button class="btn btn-green" onclick="saveAndNext()">✅ Kaydet & Tahtaya Gönder</button>
      <button class="btn btn-cancel" onclick="cancelSession()">✕ İptal</button>
    </div>
  </div>

  <!-- Doğru cevap -->
  <div class="correct-box">
    <div class="sec-label">Doğru Cevap — Tahtada gösterir</div>
    <div class="ca-btns">
      <button class="ca-btn A" onclick="setCorrect('A')">A</button>
      <button class="ca-btn B" onclick="setCorrect('B')">B</button>
      <button class="ca-btn C" onclick="setCorrect('C')">C</button>
      <button class="ca-btn D" onclick="setCorrect('D')">D</button>
    </div>
  </div>

  <!-- Manuel giriş (açılır-kapanır) -->
  <div>
    <div class="manual-toggle" id="man-toggle" onclick="toggleManual()">
      <span class="lbl">Manuel Giriş</span>
      <span class="arrow">▼</span>
    </div>
    <div class="manual-body" id="man-body">
      <div class="manual-row">
        <select class="sel" id="man-sel"></select>
        <button class="ans-btn A" onclick="manIn('A')">A</button>
        <button class="ans-btn B" onclick="manIn('B')">B</button>
        <button class="ans-btn C" onclick="manIn('C')">C</button>
        <button class="ans-btn D" onclick="manIn('D')">D</button>
      </div>
    </div>
  </div>

  <!-- Taranan cevaplar -->
  <div class="det-section">
    <div class="det-header">
      <span class="lbl">Taranan Cevaplar</span>
      <button class="det-clear" onclick="clearScan()">Temizle</button>
    </div>
    <div class="det-list" id="det-list">
      <div class="det-row" style="color:var(--muted)">Henüz cevap yok.</div>
    </div>
  </div>

  <!-- Debug -->
  <div id="debug-panel"></div>
  <button class="debug-toggle" onclick="toggleDebug()">🐛 debug</button>

</div><!-- /scroll -->

<div class="toast" id="toast"></div>

// ── HOMOGRAPHY (normalize → görüntü) ──
function gaussSolve(A,b){
  var n=8,M=A.map(function(r,i){return r.concat([b[i]]);});
  for(var col=0;col<n;col++){
    var mr=col;
    for(var row=col+1;row<n;row++) if(Math.abs(M[row][col])>Math.abs(M[mr][col]))mr=row;
    var tmp=M[col];M[col]=M[mr];M[mr]=tmp;
    if(Math.abs(M[col][col])<1e-10)return null;
    for(var row=col+1;row<n;row++){var f=M[row][col]/M[col][col];for(var k=col;k<=n;k++)M[row][k]-=f*M[col][k];}
  }
  var x=new Array(n);
  for(var i=n-1;i>=0;i--){x[i]=M[i][n];for(var j=i+1;j<n;j++)x[i]-=M[i][j]*x[j];x[i]/=M[i][i];}
  return x;
}

// normalize [0,1]² → görüntü köşeleri homography
function buildH(corners){
  // src = [TL,TR,BR,BL] normalize birim kare
  var A=[],b=[];
  var ns=[{x:0,y:0},{x:1,y:0},{x:1,y:1},{x:0,y:1}];
  for(var i=0;i<4;i++){
    var sx=ns[i].x,sy=ns[i].y,dx=corners[i].x,dy=corners[i].y;
    A.push([sx,sy,1,0,0,0,-dx*sx,-dx*sy]);b.push(dx);
    A.push([0,0,0,sx,sy,1,-dy*sx,-dy*sy]);b.push(dy);
  }
  return gaussSolve(A,b);
}

function applyH(H,nx,ny){
  var d=H[6]*nx+H[7]*ny+1;
  return{x:(H[0]*nx+H[1]*ny+H[2])/d, y:(H[3]*nx+H[4]*ny+H[5])/d};
}

// ── GÖZLE ESİKLEME ──
function toGray(data,w,h){
  var g=new Uint8Array(w*h);
  for(var i=0,n=w*h;i<n;i++){var p=i*4;g[i]=(data[p]*77+data[p+1]*150+data[p+2]*29)>>8;}
  return g;
}

function adaptiveThresh(gray,w,h){
  // Pencere boyutu: görüntünün ~1/8'i, tek sayı
  var S=((Math.min(w,h)/8)|0);
  if(S<7)S=7; if(S%2===0)S++;
  var out=new Uint8Array(w*h);
  // Integral görüntü
  var intg=new Int32Array((w+1)*(h+1));
  for(var y=0;y<h;y++)
    for(var x=0;x<w;x++)
      intg[(y+1)*(w+1)+(x+1)]=gray[y*w+x]+intg[y*(w+1)+(x+1)]+intg[(y+1)*(w+1)+x]-intg[y*(w+1)+x];
  var r=S>>1;
  for(var y=0;y<h;y++){
    for(var x=0;x<w;x++){
      var x1=x-r<0?0:x-r, y1=y-r<0?0:y-r;
      var x2=x+r>=w?w-1:x+r, y2=y+r>=h?h-1:y+r;
      var cnt=(x2-x1+1)*(y2-y1+1);
      var sum=intg[(y2+1)*(w+1)+(x2+1)]-intg[y1*(w+1)+(x2+1)]-intg[(y2+1)*(w+1)+x1]+intg[y1*(w+1)+x1];
      // 0.85 eşiği: ortalamadan %15 daha koyu ise siyah
      out[y*w+x]=(gray[y*w+x]*cnt<sum*0.85)?0:255;
    }
  }
  return out;
}

// ── KONTUR BULMA (sadece dış çerçeve) ──
// Flood fill yerine: her siyah pikselin komşusunda beyaz varsa kontur
function findContourPixels(bin,w,h){
  var contourPix=new Uint8Array(w*h);
  for(var y=1;y<h-1;y++){
    for(var x=1;x<w-1;x++){
      if(bin[y*w+x]!==0) continue;
      // En az bir beyaz komşusu varsa kontur
      if(bin[(y-1)*w+x]===255||bin[(y+1)*w+x]===255||bin[y*w+x-1]===255||bin[y*w+x+1]===255)
        contourPix[y*w+x]=1;
    }
  }
  return contourPix;
}

// Kontur piksellerini bileşenlere ayır (flood fill sadece kontur üzerinde)
function findContourComponents(contourPix,w,h,minPts,maxPts){
  var visited=new Uint8Array(w*h);
  var comps=[];
  for(var y=2;y<h-2;y++){
    for(var x=2;x<w-2;x++){
      var idx=y*w+x;
      if(!contourPix[idx]||visited[idx]) continue;
      var pts=[],stack=[idx];visited[idx]=1;
      while(stack.length){
        var p=stack.pop();pts.push(p);
        var px=p%w,py=(p/w)|0;
        var ns=[p-1,p+1,p-w,p+w,p-w-1,p-w+1,p+w-1,p+w+1]; // 8-bağlantı
        for(var k=0;k<ns.length;k++){
          var ni=ns[k];
          if(ni<0||ni>=w*h)continue;
          var nx2=ni%w,ny2=(ni/w)|0;
          if(Math.abs(nx2-px)>1||Math.abs(ny2-py)>1)continue;
          if(!visited[ni]&&contourPix[ni]){visited[ni]=1;stack.push(ni);}
        }
      }
      if(pts.length>=minPts&&pts.length<=maxPts) comps.push(pts);
    }
  }
  return comps;
}

// 4 köşe bul (min/max diyagonal)
function fourCorners(pts,w){
  var minS=1e9,maxS=-1e9,minD=1e9,maxD=-1e9,tl,br,tr,bl;
  for(var i=0;i<pts.length;i++){
    var p=pts[i],px=p%w,py=(p/w)|0,s=px+py,d=px-py;
    if(s<minS){minS=s;tl={x:px,y:py};}
    if(s>maxS){maxS=s;br={x:px,y:py};}
    if(d>maxD){maxD=d;tr={x:px,y:py};}
    if(d<minD){minD=d;bl={x:px,y:py};}
  }
  if(!tl||!tr||!br||!bl)return null;
  // Deduplicate kontrolü
  var pts4=[tl,tr,br,bl];
  var seen={};
  for(var i=0;i<4;i++){var k=pts4[i].x+','+pts4[i].y;if(seen[k])return null;seen[k]=1;}
  return pts4;
}

function quadArea(c){
  var ax=c[2].x-c[0].x,ay=c[2].y-c[0].y,bx=c[3].x-c[1].x,by=c[3].y-c[1].y;
  return Math.abs(ax*by-ay*bx)/2;
}

// Kareye yakın mı? (en-boy oranı kontrolü)
function isSquarish(c){
  function dist(a,b){var dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy);}
  var top=dist(c[0],c[1]),right=dist(c[1],c[2]),bot=dist(c[2],c[3]),left=dist(c[3],c[0]);
  var mn=Math.min(top,right,bot,left),mx=Math.max(top,right,bot,left);
  return mx>0&&mn/mx>0.4; // en/boy oranı 0.4'ten büyük
}

// ── BİT OKUMA (homography + çoklu örnekleme) ──
function sampleBit(gray,H,nx,ny,w,h){
  // 3x3 komşulukta örnekle, ortanca al
  var vals=[];
  for(var dy=-1;dy<=1;dy++){
    for(var dx=-1;dx<=1;dx++){
      var p=applyH(H,nx+dx*0.015,ny+dy*0.015);
      var ix=Math.round(p.x),iy=Math.round(p.y);
      if(ix>=0&&iy>=0&&ix<w&&iy<h) vals.push(gray[iy*w+ix]);
    }
  }
  if(!vals.length)return -1;
  vals.sort(function(a,b){return a-b;});
  return vals[Math.floor(vals.length/2)]<128?1:0;
}

function readCard(gray,corners,w,h){
  var H=buildH(corners);
  if(!H)return null;
  var rows=[];
  for(var row=1;row<=4;row++){
    var nibble=0;
    for(var col=1;col<=4;col++){
      // normalize 좌표: (col+0.5)/6, (row+0.5)/6
      var nx=(col+0.5)/6, ny=(row+0.5)/6;
      var bit=sampleBit(gray,H,nx,ny,w,h);
      if(bit<0)return null;
      nibble=(nibble<<1)|bit;
    }
    rows.push(nibble);
  }
  // Sözlükle eşleştir
  for(var i=0;i<CARD_DICT.length;i++){
    var d=CARD_DICT[i];
    if(d.rows[0]===rows[0]&&d.rows[1]===rows[1]&&d.rows[2]===rows[2]&&d.rows[3]===rows[3])
      return d;
  }
  return null;
}

// ── ANA DEDEKTÖR ──
function detectMarkers(imageData){
  var w=imageData.width,h=imageData.height;
  var gray=toGray(imageData.data,w,h);
  var bin=adaptiveThresh(gray,w,h);

  // Kontur pikselleri bul
  var contourPix=findContourPixels(bin,w,h);

  // Min/max alan eşiği
  var minA=w*h*0.001, maxA=w*h*0.6;
  var minPts=40, maxPts=w*h*0.5;

  // Kontur bileşenleri
  var comps=findContourComponents(contourPix,w,h,minPts,maxPts);

  var results=[];
  for(var i=0;i<comps.length;i++){
    var corners=fourCorners(comps[i],w);
    if(!corners)continue;
    var area=quadArea(corners);
    if(area<minA||area>maxA)continue;
    if(!isSquarish(corners))continue;

    var match=readCard(gray,corners,w,h);
    if(match) results.push({id:match.cardNum-1,cardNum:match.cardNum,answer:match.answer,corners:corners});
  }
  return results;
}

var classes = [], activeClassId = null, scanAnswers = {}, correctAnswer = null;
var camStream = null, scanning = false, lastPush = 0;

db.ref('classes').on('value', function(snap) {
  classes = [];
  snap.forEach(function(c) { classes.push(Object.assign({id:c.key}, c.val())); });
  renderChips();
  refreshManSel();

function renderChips() {
  var el = document.getElementById('class-chips');
  el.innerHTML = '';
  if (!classes.length) { el.innerHTML = '<div style="font-size:13px;color:var(--muted)">Yönetim panelinden sınıf ekleyin.</div>'; return; }
  classes.forEach(function(cls) {
    var btn = document.createElement('button');
    btn.className = 'class-chip' + (cls.id === activeClassId ? ' active' : '');
    btn.textContent = cls.name;
    btn.onclick = function() { activeClassId = cls.id; renderChips(); refreshManSel(); pushScan(); };
    el.appendChild(btn);
  });
}

function refreshManSel() {
  var sel = document.getElementById('man-sel'); sel.innerHTML = '';
  var cls = classes.find(function(c){return c.id===activeClassId;});
  if (!cls) return;
  (cls.students||[]).forEach(function(s) {
    var o = document.createElement('option'); o.value = s.cardNum; o.textContent = '#'+s.cardNum+' '+s.name; sel.appendChild(o);
  });
}

function totalStudents() { return (classes.find(function(c){return c.id===activeClassId;})||{students:[]}).students.length; }

function pushScan() {
  if (!activeClassId) return;
  db.ref('session').set({state:'scanning',classId:activeClassId,questionLabel:document.getElementById('qlabel').value||'Soru',answers:scanAnswers,correctAnswer:null,updatedAt:Date.now()});
}

function renderDet() {
  var cls = classes.find(function(c){return c.id===activeClassId;});
  var tot = totalStudents(), cnt = Object.keys(scanAnswers).length;
  var pct = tot > 0 ? cnt/tot*100 : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = cnt+'/'+tot;
  var el = document.getElementById('det-list'); el.innerHTML = '';
  var entries = Object.entries(scanAnswers);
  if (!entries.length) { el.innerHTML = '<div class="det-row" style="color:var(--muted)">Henüz cevap yok.</div>'; return; }
  entries.sort(function(a,b){return parseInt(a[0])-parseInt(b[0]);}).forEach(function(entry) {
    var cn=entry[0], ans=entry[1];
    var s = cls && cls.students ? cls.students.find(function(s){return s.cardNum==cn;}) : null;
    var div = document.createElement('div'); div.className = 'det-row';
    div.innerHTML = '<div class="ans-chip chip-'+ans+'">'+ans+'</div><span style="font-weight:600">'+(s?s.name:'Kart #'+cn)+'</span><span style="margin-left:auto;font-size:10px;color:var(--muted);font-family:\'JetBrains Mono\',monospace">#'+cn+'</span>';
    el.appendChild(div);
  });
}

function clearScan() { scanAnswers={}; correctAnswer=null; document.querySelectorAll('.ca-btn').forEach(function(b){b.classList.remove('picked');}); renderDet(); pushScan(); }
function manIn(ans) { var cn=document.getElementById('man-sel').value; if(!cn)return; scanAnswers[cn]=ans; renderDet(); pushScan(); }

function setCorrect(ans) {
  correctAnswer = ans;
  document.querySelectorAll('.ca-btn').forEach(function(b){b.classList.toggle('picked',b.textContent===ans);});
  db.ref('session/correctAnswer').set(ans);
  db.ref('session/state').set('result');
  toast('Doğru cevap: '+ans+' — Tahta güncellendi');
}

// KAMERA & TARAMA
// ════════════════════════════════════════
async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    var vid = document.getElementById('cam-video');
    vid.srcObject = camStream;
    document.getElementById('cam-start').style.display = 'none';
    document.getElementById('cam-stop').style.display = '';
    scanning = true;
    vid.play().then(function(){ requestAnimationFrame(scanLoop); }).catch(function(){ requestAnimationFrame(scanLoop); });
  } catch(e) { toast('Kamera hatası: '+e.message); }
}

function stopCam() {
  if (camStream) camStream.getTracks().forEach(function(t){t.stop();});
  scanning = false;
  document.getElementById('cam-start').style.display = '';
  document.getElementById('cam-stop').style.display = 'none';
}

function scanLoop() {
  if (!scanning) return;
  var vid = document.getElementById('cam-video');
  if (!vid.videoWidth) { requestAnimationFrame(scanLoop); return; }
  var oc  = document.getElementById('scan-canvas');
  oc.width = vid.videoWidth||640; oc.height = vid.videoHeight||480;
  var ctx = oc.getContext('2d');
  ctx.drawImage(vid, 0, 0, oc.width, oc.height);
  try {
    var imageData = ctx.getImageData(0, 0, oc.width, oc.height);
    var markers = detectMarkers(imageData);
    var newFound = false;
    markers.forEach(function(m) {
      var cardNum = m.cardNum;
      var ans = m.answer;
      if (!scanAnswers[cardNum]) {
        scanAnswers[cardNum] = ans;
        newFound = true;
        dbg('Kart #'+cardNum+' → '+ans);
      }
      // overlay
      var col = {A:'#ef4444',B:'#3b82f6',C:'#22c55e',D:'#f59e0b'}[ans];
      var c = m.corners;
      ctx.strokeStyle = col; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(c[0].x,c[0].y); ctx.lineTo(c[1].x,c[1].y);
      ctx.lineTo(c[2].x,c[2].y); ctx.lineTo(c[3].x,c[3].y);
      ctx.closePath(); ctx.stroke();
      var cls2 = classes.find(function(cl){return cl.id===activeClassId;});
      var st = cls2 && cls2.students ? cls2.students.find(function(s){return s.cardNum===cardNum;}) : null;
      ctx.fillStyle = col; ctx.font = 'bold 14px Outfit';
      ctx.fillText((st?st.name:'#'+cardNum)+': '+ans, c[0].x, c[0].y-6);
    });
    if (newFound) {
      renderDet();
      var now = Date.now();
      if (now - lastPush > 800) { pushScan(); lastPush = now; }
    }
  } catch(e) { dbg('scan err: '+e.message); }
  requestAnimationFrame(scanLoop);
}

var debugLines = [];
function dbg(msg) {
  debugLines.push(msg);
  if (debugLines.length > 8) debugLines.shift();
  var p = document.getElementById('debug-panel');
  p.innerHTML = debugLines.join('<br>');
}
function toggleDebug() { var p=document.getElementById('debug-panel'); p.style.display=p.style.display==='block'?'none':'block'; }
function toast(msg) { var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2500); }

renderDet();
function toggleManual() {
  var t = document.getElementById('man-toggle');
  var b = document.getElementById('man-body');

}

function saveAndNext() {
  if (!activeClassId) { toast('Sınıf seçin!'); return; }
  if (!Object.keys(scanAnswers).length) { toast('Henüz cevap yok!'); return; }
  // Kaydet
  var entry = {id:Date.now().toString(),classId:activeClassId,label:document.getElementById('qlabel').value||'Soru '+Date.now(),correct:correctAnswer,date:Date.now(),answers:Object.assign({},scanAnswers)};
  db.ref('history/'+entry.id).set(entry);
  db.ref('session').set({state:'result',classId:activeClassId,questionLabel:entry.label,answers:scanAnswers,correctAnswer:correctAnswer,currentResult:entry,updatedAt:Date.now()});
  toast('Kaydedildi! ✅ — Yeni soru hazır');
  // Yeni soruya geç
  setTimeout(function(){
    scanAnswers={}; correctAnswer=null;
    document.getElementById('qlabel').value='';
    document.querySelectorAll('.ca-btn').forEach(function(b){b.classList.remove('picked');});
    renderDet();
    db.ref('session').set({state:'scanning',classId:activeClassId,questionLabel:'',answers:{},correctAnswer:null,updatedAt:Date.now()});
  }, 1200);
}

function cancelSession() {
  scanAnswers={}; correctAnswer=null;
  document.getElementById('qlabel').value='';
  document.querySelectorAll('.ca-btn').forEach(function(b){b.classList.remove('picked');});
  renderDet();
  db.ref('session').set({state:'scanning',classId:activeClassId,questionLabel:'',answers:{},correctAnswer:null,updatedAt:Date.now()});
  toast('Soru iptal edildi');
}
