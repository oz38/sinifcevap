<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SınıfCevap — Tarama</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
:root{
  --bg:#0d0f14;--surface:#151820;--card:#1c2030;--border:#252a3a;
  --accent:#4f8ef7;--green:#3dd68c;--yellow:#f7c948;--red:#f75f4f;
  --text:#e8ecf5;--muted:#6b7494;
  --A:#ef4444;--B:#3b82f6;--C:#22c55e;--D:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{font-weight:900;font-size:16px;color:var(--accent);}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);margin-left:auto;}
.conn-dot.ok{background:var(--green);}

.content{flex:1;overflow-y:auto;padding:16px;}

/* CLASS SELECT */
.class-select-wrap{margin-bottom:16px;}
.section-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.class-chips{display:flex;flex-wrap:wrap;gap:8px;}
.class-chip{padding:8px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;color:var(--text);transition:all .15s;}
.class-chip.active{border-color:var(--accent);background:rgba(79,142,247,.12);color:var(--accent);}

/* QUESTION LABEL */
.qlabel-row{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.qlabel-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;}
.qlabel-input:focus{outline:none;border-color:var(--accent);}

/* VIDEO */
.video-wrap{position:relative;background:#000;border-radius:12px;overflow:hidden;border:2px solid var(--border);margin-bottom:12px;}
#cam-video{width:100%;display:block;max-height:250px;object-fit:cover;}
#scan-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}

.cam-btns{display:flex;gap:8px;margin-bottom:12px;}
.btn{padding:9px 16px;border-radius:8px;border:none;font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.btn-primary{background:var(--accent);color:white;}
.btn-danger{background:var(--red);color:white;}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border);}
.btn-success{background:var(--green);color:#0d1a0f;}
.btn-full{width:100%;justify-content:center;padding:12px;}

.status-bar{background:var(--card);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--muted);margin-bottom:12px;}

/* PROGRESS */
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.prog-wrap{flex:1;height:8px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s;}
.prog-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);white-space:nowrap;}

/* DETECTED LIST */
.detected-list{background:var(--card);border-radius:10px;overflow:hidden;margin-bottom:12px;max-height:200px;overflow-y:auto;}
.det-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;}
.det-row:last-child{border-bottom:none;}
.ans-chip{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:white;flex-shrink:0;}
.chip-A{background:var(--A);}.chip-B{background:var(--B);}.chip-C{background:var(--C);}.chip-D{background:var(--D);}.chip-none{background:var(--border);}

/* MANUAL */
.manual-wrap{background:var(--card);border-radius:10px;padding:12px;margin-bottom:12px;}
.manual-row{display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap;}
.sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;flex:1;}
.ans-btn{width:40px;height:40px;border-radius:8px;border:none;font-weight:900;font-size:16px;color:white;cursor:pointer;}
.ans-btn.A{background:var(--A);}.ans-btn.B{background:var(--B);}.ans-btn.C{background:var(--C);}.ans-btn.D{background:var(--D);}

/* CORRECT ANSWER */
.correct-wrap{background:var(--card);border-radius:10px;padding:12px;margin-bottom:12px;}
.correct-btns{display:flex;gap:8px;margin-top:8px;}
.ca-btn{flex:1;height:44px;border-radius:9px;border:3px solid transparent;font-weight:900;font-size:18px;color:white;cursor:pointer;transition:all .15s;}
.ca-btn.A{background:var(--A);}.ca-btn.B{background:var(--B);}.ca-btn.C{background:var(--C);}.ca-btn.D{background:var(--D);}
.ca-btn.picked{border-color:white;transform:scale(1.1);}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--green);color:#0d1a0f;padding:10px 20px;border-radius:10px;font-weight:700;font-size:14px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}

::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">📱 SınıfCevap Tarama</div>
  <div class="conn-dot" id="conn-dot"></div>
</div>

<div class="content">
  <!-- CLASS SELECT -->
  <div class="class-select-wrap">
    <div class="section-label">Sınıf Seç</div>
    <div class="class-chips" id="class-chips">
      <div style="font-size:13px;color:var(--muted)">Yükleniyor...</div>
    </div>
  </div>

  <!-- QUESTION LABEL -->
  <div class="section-label">Soru Başlığı (opsiyonel)</div>
  <div class="qlabel-row" style="margin-bottom:12px">
    <input type="text" class="qlabel-input" id="qlabel" placeholder="Örn: Fen 3. Soru">
  </div>

  <!-- CAMERA -->
  <div class="video-wrap">
    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="scan-canvas"></canvas>
  </div>
  <div class="cam-btns">
    <button class="btn btn-primary" id="cam-start" onclick="startCam()">▶ Kamerayı Başlat</button>
    <button class="btn btn-danger" id="cam-stop" onclick="stopCam()" style="display:none">⏹ Durdur</button>
    <button class="btn btn-ghost" onclick="clearScan()">🗑</button>
  </div>
  <div class="status-bar" id="status-bar">Kamera başlatılmadı.</div>

  <!-- PROGRESS -->
  <div class="prog-row">
    <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-text" id="prog-text">0/0</div>
  </div>

  <!-- DETECTED -->
  <div class="section-label">Taranan Cevaplar</div>
  <div class="detected-list" id="detected-list">
    <div class="det-row" style="color:var(--muted)">Henüz cevap yok.</div>
  </div>

  <!-- MANUAL INPUT -->
  <div class="manual-wrap">
    <div class="section-label">Manuel Giriş</div>
    <div class="manual-row">
      <select class="sel" id="man-sel"></select>
      <button class="ans-btn A" onclick="manualIn('A')">A</button>
      <button class="ans-btn B" onclick="manualIn('B')">B</button>
      <button class="ans-btn C" onclick="manualIn('C')">C</button>
      <button class="ans-btn D" onclick="manualIn('D')">D</button>
    </div>
  </div>

  <!-- CORRECT ANSWER -->
  <div class="correct-wrap">
    <div class="section-label">Doğru Cevabı Seç (Tahtaya Yansır)</div>
    <div class="correct-btns">
      <button class="ca-btn A" onclick="setCorrect('A')">A</button>
      <button class="ca-btn B" onclick="setCorrect('B')">B</button>
      <button class="ca-btn C" onclick="setCorrect('C')">C</button>
      <button class="ca-btn D" onclick="setCorrect('D')">D</button>
    </div>
  </div>

  <!-- SAVE -->
  <button class="btn btn-success btn-full" onclick="saveScan()" style="margin-bottom:24px">✅ Kaydet & Tahtaya Gönder</button>
</div>

<div class="toast" id="toast"></div>

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

db.ref('.info/connected').on('value', s => {
  document.getElementById('conn-dot').className = 'conn-dot' + (s.val()?' ok':'');
});

let classes = [];
let activeClassId = null;
let scanAnswers = {};
let correctAnswer = null;
let camStream = null, scanFrame = null;

// Load classes
db.ref('classes').on('value', snap => {
  classes = [];
  snap.forEach(c => classes.push({id:c.key,...c.val()}));
  renderClassChips();
  refreshManualSel();
});

function renderClassChips() {
  const el = document.getElementById('class-chips');
  el.innerHTML = '';
  if (!classes.length) {
    el.innerHTML = '<div style="font-size:13px;color:var(--muted)">Önce yönetim panelinden sınıf ekleyin.</div>';
    return;
  }
  classes.forEach(cls => {
    const btn = document.createElement('button');
    btn.className = 'class-chip' + (cls.id===activeClassId?' active':'');
    btn.textContent = cls.name;
    btn.onclick = () => { activeClassId=cls.id; renderClassChips(); refreshManualSel(); pushScanState(); };
    el.appendChild(btn);
  });
}

function refreshManualSel() {
  const sel = document.getElementById('man-sel');
  sel.innerHTML = '';
  const cls = classes.find(c=>c.id===activeClassId);
  if (!cls) return;
  (cls.students||[]).forEach(s => {
    const opt = document.createElement('option');
    opt.value = s.cardNum;
    opt.textContent = `#${s.cardNum} ${s.name}`;
    sel.appendChild(opt);
  });
}

function getStudentCount() {
  return (classes.find(c=>c.id===activeClassId)?.students||[]).length;
}

function pushScanState() {
  if (!activeClassId) return;
  db.ref('session').set({
    state: 'scanning',
    classId: activeClassId,
    questionLabel: document.getElementById('qlabel').value||'Soru',
    answers: scanAnswers,
    correctAnswer: null,
    updatedAt: Date.now()
  });
}

function renderDetected() {
  const cls = classes.find(c=>c.id===activeClassId);
  const total = getStudentCount();
  const count = Object.keys(scanAnswers).length;
  const pct = total>0?count/total*100:0;
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-text').textContent = `${count}/${total}`;
  document.getElementById('status-bar').textContent = `🔍 Taranan: ${count}/${total}`;
  const el = document.getElementById('detected-list');
  el.innerHTML = '';
  const entries = Object.entries(scanAnswers);
  if (!entries.length) {
    el.innerHTML = '<div class="det-row" style="color:var(--muted)">Henüz cevap yok.</div>';
    return;
  }
  entries.sort((a,b)=>parseInt(a[0])-parseInt(b[0])).forEach(([cn,ans])=>{
    const s = cls?.students?.find(s=>s.cardNum==cn);
    const div = document.createElement('div');
    div.className = 'det-row';
    div.innerHTML = `<div class="ans-chip chip-${ans}">${ans}</div><span style="font-weight:600">${s?.name||'Kart #'+cn}</span><span style="margin-left:auto;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">#${cn}</span>`;
    el.appendChild(div);
  });
}

function clearScan() {
  scanAnswers = {};
  renderDetected();
  pushScanState();
}

function manualIn(ans) {
  const cn = document.getElementById('man-sel').value;
  if (!cn) return;
  scanAnswers[cn] = ans;
  renderDetected();
  pushScanState();
}

function setCorrect(ans) {
  correctAnswer = ans;
  document.querySelectorAll('.ca-btn').forEach(b=>b.classList.toggle('picked',b.textContent===ans));
  // Live push correct answer to tahta
  db.ref('session/correctAnswer').set(ans);
  db.ref('session/state').set('result');
}

function saveScan() {
  if (!activeClassId) { toast('Sınıf seçin!'); return; }
  if (!Object.keys(scanAnswers).length) { toast('Henüz cevap yok!'); return; }
  const entry = {
    id: Date.now().toString(),
    classId: activeClassId,
    label: document.getElementById('qlabel').value||`Soru ${Date.now()}`,
    correct: correctAnswer,
    date: Date.now(),
    answers: {...scanAnswers}
  };
  db.ref('history/'+entry.id).set(entry);
  db.ref('session').set({
    state: 'result',
    classId: activeClassId,
    questionLabel: entry.label,
    answers: scanAnswers,
    correctAnswer: correctAnswer,
    currentResult: entry,
    updatedAt: Date.now()
  });
  toast('Kaydedildi ve tahtaya gönderildi! ✅');
  // Reset for next question
  setTimeout(()=>{ scanAnswers={}; correctAnswer=null; document.getElementById('qlabel').value=''; document.querySelectorAll('.ca-btn').forEach(b=>b.classList.remove('picked')); renderDetected(); },1500);
}

// ── ARUCO DETECTION ──
const PATTERNS=[
  0b0001011010010100,0b0001001101011000,0b0000011011011000,0b0001011100010100,
  0b0001010110101000,0b0000001110011100,0b0001101001010100,0b0000110100110100,
  0b0001011000111000,0b0000100101110100,0b0001110001101000,0b0000010110110100,
  0b0001010011101000,0b0000101101010100,0b0001100001110100,0b0000011110010100,
  0b0001001011010100,0b0000111000110100,0b0001101011000100,0b0000011010101100,
  0b0001001110100100,0b0000110001110100,0b0001100101100100,0b0000011101100100,
  0b0001010001111000,
];

function getPixel(d,w,h,x,y){if(x<0||y<0||x>=w||y>=h)return 128;const i=(y*w+x)*4;return(d[i]+d[i+1]+d[i+2])/3;}
function tryDecode(d,w,h,x,y,cs){
  for(let i=0;i<6;i++){
    if(getPixel(d,w,h,x+i*cs+cs/2,y+cs/2)>80)return -1;
    if(getPixel(d,w,h,x+i*cs+cs/2,y+5*cs+cs/2)>80)return -1;
    if(getPixel(d,w,h,x+cs/2,y+i*cs+cs/2)>80)return -1;
    if(getPixel(d,w,h,x+5*cs+cs/2,y+i*cs+cs/2)>80)return -1;
  }
  let bits=0;
  for(let r=0;r<4;r++)for(let c=0;c<4;c++){const b=getPixel(d,w,h,x+(c+1)*cs+cs/2,y+(r+1)*cs+cs/2)<100?1:0;bits=(bits<<1)|b;}
  for(let id=0;id<PATTERNS.length;id++){if(PATTERNS[id]===bits)return id;for(let rot=1;rot<4;rot++)if(rot4(PATTERNS[id],rot)===bits)return id;}
  return -1;
}
function rot4(bits,times){let b=bits;for(let t=0;t<times;t++){let nb=0;for(let r=0;r<4;r++)for(let c=0;c<4;c++){const bit=(b>>(15-(r*4+c)))&1;nb|=(bit<<(15-(c*4+(3-r))));}b=nb;}return b;}
function getAnswer(d,w,h,x,y,cs){
  function avg(ax,ay,aw,ah){let s=0,n=0;for(let dy=0;dy<ah;dy+=3)for(let dx=0;dx<aw;dx+=3){s+=getPixel(d,w,h,ax+dx,ay+dy);n++;}return n?s/n:128;}
  const top=avg(x+cs,y+cs,cs*4,cs)>140;
  const left=avg(x+cs,y+cs,cs,cs*4)>avg(x+4*cs,y+cs,cs,cs*4);
  if(top&&left)return 'A';if(top&&!left)return 'B';if(!top&&left)return 'C';return 'D';
}

async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    const vid = document.getElementById('cam-video');
    vid.srcObject = camStream;
    document.getElementById('cam-start').style.display='none';
    document.getElementById('cam-stop').style.display='';
    document.getElementById('status-bar').textContent='📸 Kamera aktif...';
    vid.onloadedmetadata = () => scanLoop();
  } catch(e) { document.getElementById('status-bar').textContent='❌ Kamera erişimi reddedildi.'; }
}

function stopCam() {
  if(camStream)camStream.getTracks().forEach(t=>t.stop());
  if(scanFrame)cancelAnimationFrame(scanFrame);
  document.getElementById('cam-start').style.display='';
  document.getElementById('cam-stop').style.display='none';
  document.getElementById('status-bar').textContent='Kamera durduruldu.';
}

let lastPush = 0;
function scanLoop() {
  const vid=document.getElementById('cam-video');
  const oc=document.getElementById('scan-canvas');
  const ctx=oc.getContext('2d');
  oc.width=vid.videoWidth||640;oc.height=vid.videoHeight||480;
  ctx.clearRect(0,0,oc.width,oc.height);
  ctx.drawImage(vid,0,0,oc.width,oc.height);
  const imgData=ctx.getImageData(0,0,oc.width,oc.height);
  const d=imgData.data;
  const step=4,threshold=100;
  const cellMin=Math.max(4,Math.floor(Math.min(oc.width,oc.height)/20)-4);
  const cellMax=cellMin+12;
  let newFound=false;
  for(let y=0;y<oc.height-cellMax*6;y+=step*2){
    for(let x=0;x<oc.width-cellMax*6;x+=step*2){
      const idx=(y*oc.width+x)*4;
      if((d[idx]+d[idx+1]+d[idx+2])/3>threshold)continue;
      for(let cs=cellMin;cs<=cellMax;cs+=2){
        const id=tryDecode(d,oc.width,oc.height,x,y,cs);
        if(id>=0&&id<25){
          const ans=getAnswer(d,oc.width,oc.height,x,y,cs);
          if(ans&&!scanAnswers[id+1]){scanAnswers[id+1]=ans;newFound=true;}
          ctx.strokeStyle='#3dd68c';ctx.lineWidth=3;ctx.strokeRect(x,y,cs*6,cs*6);
          ctx.fillStyle='rgba(61,214,140,.15)';ctx.fillRect(x,y,cs*6,cs*6);
          ctx.fillStyle='#3dd68c';ctx.font='bold 12px Outfit';
          const cls=classes.find(c=>c.id===activeClassId);
          const name=cls?.students?.find(s=>s.cardNum===id+1)?.name||`#${id+1}`;
          ctx.fillText(`${name}:${ans}`,x,y-4);
          break;
        }
      }
    }
  }
  if(newFound){renderDetected();const now=Date.now();if(now-lastPush>1000){pushScanState();lastPush=now;}}
  scanFrame=requestAnimationFrame(scanLoop);
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

renderDetected();
</script>
