<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SınıfCevap — Tarama</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
:root{
  --bg:#0d0f14;--surface:#151820;--card:#1c2030;--border:#252a3a;
  --accent:#4f8ef7;--green:#3dd68c;--yellow:#f7c948;--red:#f75f4f;
  --text:#e8ecf5;--muted:#6b7494;
  --A:#ef4444;--B:#3b82f6;--C:#22c55e;--D:#f59e0b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{font-weight:900;font-size:15px;color:var(--accent);}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);margin-left:auto;transition:background .3s;}
.conn-dot.ok{background:var(--green);}
.content{flex:1;overflow-y:auto;padding:14px;}
.cv-status{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.cv-dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);flex-shrink:0;}
.cv-dot.ready{background:var(--green);}
.cv-dot.error{background:var(--red);}
.sec-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;}
.class-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;}
.class-chip{padding:7px 13px;background:var(--card);border:1.5px solid var(--border);border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;color:var(--text);transition:all .15s;}
.class-chip.active{border-color:var(--accent);background:rgba(79,142,247,.12);color:var(--accent);}
.q-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;margin-bottom:14px;}
.q-input:focus{outline:none;border-color:var(--accent);}
.video-wrap{position:relative;background:#000;border-radius:12px;overflow:hidden;border:2px solid var(--border);margin-bottom:10px;}
#cam-video{width:100%;display:block;max-height:240px;object-fit:cover;}
#scan-canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.cam-btns{display:flex;gap:8px;margin-bottom:10px;}
.btn{padding:9px 14px;border-radius:8px;border:none;font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s;}
.btn-primary{background:var(--accent);color:white;}
.btn-danger{background:var(--red);color:white;}
.btn-ghost{background:var(--card);color:var(--text);border:1px solid var(--border);}
.btn-success{background:var(--green);color:#0d1a0f;}
.btn-full{width:100%;justify-content:center;padding:11px;font-size:14px;}
.prog-row{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.prog-wrap{flex:1;height:7px;background:var(--border);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent);border-radius:99px;transition:width .3s;}
.prog-text{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
.det-list{background:var(--card);border-radius:10px;overflow:hidden;margin-bottom:12px;max-height:180px;overflow-y:auto;}
.det-row{display:flex;align-items:center;gap:9px;padding:7px 11px;border-bottom:1px solid var(--border);font-size:13px;}
.det-row:last-child{border-bottom:none;}
.ans-chip{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;color:white;flex-shrink:0;}
.chip-A{background:var(--A);}.chip-B{background:var(--B);}.chip-C{background:var(--C);}.chip-D{background:var(--D);}
.manual-box{background:var(--card);border-radius:10px;padding:11px;margin-bottom:12px;}
.manual-row{display:flex;gap:7px;align-items:center;margin-top:7px;flex-wrap:wrap;}
.sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 9px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;flex:1;min-width:0;}
.ans-btn{width:38px;height:38px;border-radius:8px;border:none;font-weight:900;font-size:15px;color:white;cursor:pointer;transition:transform .1s;}
.ans-btn:active{transform:scale(.92);}
.ans-btn.A{background:var(--A);}.ans-btn.B{background:var(--B);}.ans-btn.C{background:var(--C);}.ans-btn.D{background:var(--D);}
.correct-box{background:var(--card);border-radius:10px;padding:11px;margin-bottom:12px;}
.ca-btns{display:flex;gap:7px;margin-top:7px;}
.ca-btn{flex:1;height:42px;border-radius:9px;border:3px solid transparent;font-weight:900;font-size:17px;color:white;cursor:pointer;transition:all .15s;}
.ca-btn.A{background:var(--A);}.ca-btn.B{background:var(--B);}.ca-btn.C{background:var(--C);}.ca-btn.D{background:var(--D);}
.ca-btn.picked{border-color:white;transform:scale(1.08);}
#debug-panel{background:#1a0a00;border:1px solid #f59e0b;border-radius:8px;padding:8px 12px;font-size:11px;color:#f59e0b;font-family:'JetBrains Mono',monospace;margin-bottom:10px;max-height:120px;overflow-y:auto;line-height:1.6;display:none;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--green);color:#0d1a0f;padding:9px 18px;border-radius:10px;font-weight:700;font-size:13px;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">📱 SınıfCevap Tarama</div>
  <div class="conn-dot" id="conn-dot"></div>
</div>
<div class="content">
  <div class="cv-status">
    <div class="cv-dot ready" id="cv-dot"></div>
    <span id="cv-text">ArUco dedektörü hazır ✓</span>
  </div>
  <div class="sec-label">Sınıf Seç</div>
  <div class="class-chips" id="class-chips"><div style="font-size:13px;color:var(--muted)">Yükleniyor...</div></div>
  <div class="sec-label">Soru Başlığı</div>
  <input type="text" class="q-input" id="qlabel" placeholder="Örn: Fen 3. Soru">
  <div class="video-wrap">
    <video id="cam-video" autoplay playsinline muted></video>
    <canvas id="scan-canvas"></canvas>
  </div>
  <div id="debug-panel"></div>
  <div class="cam-btns">
    <button class="btn btn-primary" id="cam-start" onclick="startCam()">▶ Kamerayı Başlat</button>
    <button class="btn btn-danger" id="cam-stop" onclick="stopCam()" style="display:none">⏹ Durdur</button>
    <button class="btn btn-ghost" onclick="clearScan()">🗑</button>
    <button class="btn btn-ghost" onclick="toggleDebug()" style="font-size:11px">🐛</button>
  </div>
  <div class="prog-row">
    <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-text" id="prog-text">0/0</div>
  </div>
  <div class="sec-label">Taranan Cevaplar</div>
  <div class="det-list" id="det-list">
    <div class="det-row" style="color:var(--muted)">Henüz cevap yok.</div>
  </div>
  <div class="manual-box">
    <div class="sec-label">Manuel Giriş</div>
    <div class="manual-row">
      <select class="sel" id="man-sel"></select>
      <button class="ans-btn A" onclick="manIn('A')">A</button>
      <button class="ans-btn B" onclick="manIn('B')">B</button>
      <button class="ans-btn C" onclick="manIn('C')">C</button>
      <button class="ans-btn D" onclick="manIn('D')">D</button>
    </div>
  </div>
  <div class="correct-box">
    <div class="sec-label">Doğru Cevap — Seçince Tahtada Açıklanır</div>
    <div class="ca-btns">
      <button class="ca-btn A" onclick="setCorrect('A')">A</button>
      <button class="ca-btn B" onclick="setCorrect('B')">B</button>
      <button class="ca-btn C" onclick="setCorrect('C')">C</button>
      <button class="ca-btn D" onclick="setCorrect('D')">D</button>
    </div>
  </div>
  <button class="btn btn-success btn-full" onclick="saveScan()" style="margin-bottom:20px">✅ Kaydet & Tahtaya Gönder</button>
  <button class="btn btn-ghost btn-full" onclick="resetSession()" style="margin-bottom:24px">🔄 Yeni Soruya Geç</button>
</div>
<div class="toast" id="toast"></div>

function detectMarkers(imageData) {
  var w = imageData.width, h = imageData.height;
  var gray = toGray(imageData.data, w, h);
  var bin  = adaptiveThreshold(gray, w, h);
  var quads = findQuads(bin, w, h);
  var results = [];
  for (var i = 0; i < quads.length; i++) {
    var q = quads[i]; // [TL,TR,BR,BL]
    var match = readCard(gray, q, w, h);
    if (match) results.push({ id: match.cardNum - 1, cardNum: match.cardNum, answer: match.answer, corners: q });
  }
  return results;
}

function toGray(data, w, h) {
  var g = new Uint8Array(w * h);
  for (var i = 0, n = w*h; i < n; i++) {
    var p = i*4;
    g[i] = (data[p]*77 + data[p+1]*150 + data[p+2]*29) >> 8;
  }
  return g;
}

function adaptiveThreshold(gray, w, h) {
  var out = new Uint8Array(w * h);
  var S = Math.max(11, (Math.min(w,h) >> 4) | 1);
  if (S % 2 === 0) S++;
  var intg = new Int32Array((w+1)*(h+1));
  for (var y = 0; y < h; y++)
    for (var x = 0; x < w; x++)
      intg[(y+1)*(w+1)+(x+1)] = gray[y*w+x] + intg[y*(w+1)+(x+1)] + intg[(y+1)*(w+1)+x] - intg[y*(w+1)+x];
  var r = S >> 1;
  for (var y = 0; y < h; y++) {
    for (var x = 0; x < w; x++) {
      var x1=Math.max(0,x-r), y1=Math.max(0,y-r), x2=Math.min(w-1,x+r), y2=Math.min(h-1,y+r);
      var cnt = (x2-x1+1)*(y2-y1+1);
      var sum = intg[(y2+1)*(w+1)+(x2+1)] - intg[y1*(w+1)+(x2+1)] - intg[(y2+1)*(w+1)+x1] + intg[y1*(w+1)+x1];
      out[y*w+x] = (gray[y*w+x] * cnt < sum * 0.83) ? 0 : 255;
    }
  }
  return out;
}

function findQuads(bin, w, h) {
  var visited = new Uint8Array(w * h);
  var quads = [];
  var minA = w * h * 0.0008, maxA = w * h * 0.65;
  for (var y = 2; y < h-2; y++) {
    for (var x = 2; x < w-2; x++) {
      var idx = y*w+x;
      if (bin[idx] !== 0 || visited[idx]) continue;
      var pts = [];
      var stack = [idx];
      visited[idx] = 1;
      while (stack.length) {
        var p = stack.pop(); pts.push(p);
        var px = p%w, py = (p/w)|0;
        for (var d = 0; d < 4; d++) {
          var nx = px + (d===2?1:d===3?-1:0);
          var ny = py + (d===0?1:d===1?-1:0);
          if (nx<0||ny<0||nx>=w||ny>=h) continue;
          var ni = ny*w+nx;
          if (!visited[ni] && bin[ni]===0) { visited[ni]=1; stack.push(ni); }
        }
      }
      if (pts.length < 30) continue;
      var corners = fourCorners(pts, w);
      if (!corners) continue;
      var area = quadArea(corners);
      if (area < minA || area > maxA) continue;
      quads.push(corners);
    }
  }
  return quads;
}

function fourCorners(pts, w) {
  var minS=1e9,maxS=-1e9,minD=1e9,maxD=-1e9;
  var tl,br,tr,bl;
  for (var i = 0; i < pts.length; i++) {
    var p=pts[i], px=p%w, py=(p/w)|0, s=px+py, d=px-py;
    if(s<minS){minS=s;tl={x:px,y:py};}
    if(s>maxS){maxS=s;br={x:px,y:py};}
    if(d>maxD){maxD=d;tr={x:px,y:py};}
    if(d<minD){minD=d;bl={x:px,y:py};}
  }
  if(!tl||!tr||!br||!bl) return null;
  var k=[tl.x+','+tl.y, tr.x+','+tr.y, br.x+','+br.y, bl.x+','+bl.y];
  if(new Set(k).size < 4) return null;
  return [tl, tr, br, bl];
}

function quadArea(c) {
  var ax=c[2].x-c[0].x, ay=c[2].y-c[0].y;
  var bx=c[3].x-c[1].x, by=c[3].y-c[1].y;
  return Math.abs(ax*by - ay*bx)/2;
}

function readCard(gray, corners, w, h) {
  // Homography ile 6x6 ızgara örnekle
  // corners = [TL, TR, BR, BL]
  var tl=corners[0], tr=corners[1], br=corners[2], bl=corners[3];
  var N = 6;
  var rows = [];
  for (var row = 0; row < N; row++) {
    var nibble = 0;
    for (var col = 0; col < N; col++) {
      var t = (row + 0.5) / N;
      var s = (col + 0.5) / N;
      var x = Math.round((1-t)*((1-s)*tl.x + s*tr.x) + t*((1-s)*bl.x + s*br.x));
      var y = Math.round((1-t)*((1-s)*tl.y + s*tr.y) + t*((1-s)*bl.y + s*br.y));
      if (x<0||y<0||x>=w||y>=h) return null;
      // Sadece iç 4x4 (satır 1-4, sütun 1-4) nibble oluşturur
      if (row >= 1 && row <= 4 && col >= 1 && col <= 4) {
        nibble = (nibble << 1) | (gray[y*w+x] < 128 ? 1 : 0);
        if (col === 4) rows.push(nibble);
      }
    }
  }
  if (rows.length !== 4) return null;

  // Sözlükle eşleştir
  for (var i = 0; i < CARD_DICT.length; i++) {
    var d = CARD_DICT[i];
    if (d.rows[0]===rows[0] && d.rows[1]===rows[1] && d.rows[2]===rows[2] && d.rows[3]===rows[3])
      return d;
  }
  return null;
}

function markerAngle(corners) {
  var dx = corners[1].x - corners[0].x;
  var dy = corners[1].y - corners[0].y;
  return Math.atan2(dy, dx) * 180 / Math.PI;
}

  document.getElementById('conn-dot').className = 'conn-dot' + (s.val() ? ' ok' : '');
});

var classes = [], activeClassId = null, scanAnswers = {}, correctAnswer = null;
var camStream = null, scanning = false, lastPush = 0;

db.ref('classes').on('value', function(snap) {
  classes = [];
  snap.forEach(function(c) { classes.push(Object.assign({id:c.key}, c.val())); });
  renderChips();
  refreshManSel();
});

function renderChips() {
  var el = document.getElementById('class-chips');
  el.innerHTML = '';
  if (!classes.length) { el.innerHTML = '<div style="font-size:13px;color:var(--muted)">Yönetim panelinden sınıf ekleyin.</div>'; return; }
  classes.forEach(function(cls) {
    var btn = document.createElement('button');
    btn.className = 'class-chip' + (cls.id === activeClassId ? ' active' : '');
    btn.textContent = cls.name;
    btn.onclick = function() { activeClassId = cls.id; renderChips(); refreshManSel(); pushScan(); };
    el.appendChild(btn);
  });
}

function refreshManSel() {
  var sel = document.getElementById('man-sel'); sel.innerHTML = '';
  var cls = classes.find(function(c){return c.id===activeClassId;});
  if (!cls) return;
  (cls.students||[]).forEach(function(s) {
    var o = document.createElement('option'); o.value = s.cardNum; o.textContent = '#'+s.cardNum+' '+s.name; sel.appendChild(o);
  });
}

function totalStudents() { return (classes.find(function(c){return c.id===activeClassId;})||{students:[]}).students.length; }

function pushScan() {
  if (!activeClassId) return;
  db.ref('session').set({state:'scanning',classId:activeClassId,questionLabel:document.getElementById('qlabel').value||'Soru',answers:scanAnswers,correctAnswer:null,updatedAt:Date.now()});
}

function renderDet() {
  var cls = classes.find(function(c){return c.id===activeClassId;});
  var tot = totalStudents(), cnt = Object.keys(scanAnswers).length;
  var pct = tot > 0 ? cnt/tot*100 : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-text').textContent = cnt+'/'+tot;
  var el = document.getElementById('det-list'); el.innerHTML = '';
  var entries = Object.entries(scanAnswers);
  if (!entries.length) { el.innerHTML = '<div class="det-row" style="color:var(--muted)">Henüz cevap yok.</div>'; return; }
  entries.sort(function(a,b){return parseInt(a[0])-parseInt(b[0]);}).forEach(function(entry) {
    var cn=entry[0], ans=entry[1];
    var s = cls && cls.students ? cls.students.find(function(s){return s.cardNum==cn;}) : null;
    var div = document.createElement('div'); div.className = 'det-row';
    div.innerHTML = '<div class="ans-chip chip-'+ans+'">'+ans+'</div><span style="font-weight:600">'+(s?s.name:'Kart #'+cn)+'</span><span style="margin-left:auto;font-size:10px;color:var(--muted);font-family:\'JetBrains Mono\',monospace">#'+cn+'</span>';
    el.appendChild(div);
  });
}

function clearScan() { scanAnswers={}; correctAnswer=null; document.querySelectorAll('.ca-btn').forEach(function(b){b.classList.remove('picked');}); renderDet(); pushScan(); }
function manIn(ans) { var cn=document.getElementById('man-sel').value; if(!cn)return; scanAnswers[cn]=ans; renderDet(); pushScan(); }

function setCorrect(ans) {
  correctAnswer = ans;
  document.querySelectorAll('.ca-btn').forEach(function(b){b.classList.toggle('picked',b.textContent===ans);});
  db.ref('session/correctAnswer').set(ans);
  db.ref('session/state').set('result');
  toast('Doğru cevap: '+ans+' — Tahta güncellendi');
}

function saveScan() {
  if (!activeClassId) { toast('Sınıf seçin!'); return; }
  if (!Object.keys(scanAnswers).length) { toast('Henüz cevap yok!'); return; }
  var entry = {id:Date.now().toString(),classId:activeClassId,label:document.getElementById('qlabel').value||'Soru '+Date.now(),correct:correctAnswer,date:Date.now(),answers:Object.assign({},scanAnswers)};
  db.ref('history/'+entry.id).set(entry);
  db.ref('session').set({state:'result',classId:activeClassId,questionLabel:entry.label,answers:scanAnswers,correctAnswer:correctAnswer,currentResult:entry,updatedAt:Date.now()});
  toast('Kaydedildi! ✅');
}

function resetSession() {
  scanAnswers={}; correctAnswer=null;
  document.getElementById('qlabel').value='';
  document.querySelectorAll('.ca-btn').forEach(function(b){b.classList.remove('picked');});
  renderDet();
  db.ref('session').set({state:'scanning',classId:activeClassId,questionLabel:'',answers:{},correctAnswer:null,updatedAt:Date.now()});
  toast('Yeni soru hazır');
}

// ════════════════════════════════════════
// KAMERA & TARAMA
// ════════════════════════════════════════
async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}});
    var vid = document.getElementById('cam-video');
    vid.srcObject = camStream;
    document.getElementById('cam-start').style.display = 'none';
    document.getElementById('cam-stop').style.display = '';
    scanning = true;
    vid.onloadedmetadata = function(){ requestAnimationFrame(scanLoop); };
  } catch(e) { toast('Kamera hatası: '+e.message); }
}

function stopCam() {
  if (camStream) camStream.getTracks().forEach(function(t){t.stop();});
  scanning = false;
  document.getElementById('cam-start').style.display = '';
  document.getElementById('cam-stop').style.display = 'none';
}

function scanLoop() {
  if (!scanning) return;
  var vid = document.getElementById('cam-video');
  var oc  = document.getElementById('scan-canvas');
  oc.width = vid.videoWidth||640; oc.height = vid.videoHeight||480;
  var ctx = oc.getContext('2d');
  ctx.drawImage(vid, 0, 0, oc.width, oc.height);
  try {
    var imageData = ctx.getImageData(0, 0, oc.width, oc.height);
    var markers = detectMarkers(imageData);
    var newFound = false;
    markers.forEach(function(m) {
      var cardNum = m.cardNum;
      var ans = m.answer;
      if (!scanAnswers[cardNum]) {
        scanAnswers[cardNum] = ans;
        newFound = true;
        dbg('Kart #'+cardNum+' → '+ans);
      }
      // overlay
      var col = {A:'#ef4444',B:'#3b82f6',C:'#22c55e',D:'#f59e0b'}[ans];
      var c = m.corners;
      ctx.strokeStyle = col; ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(c[0].x,c[0].y); ctx.lineTo(c[1].x,c[1].y);
      ctx.lineTo(c[2].x,c[2].y); ctx.lineTo(c[3].x,c[3].y);
      ctx.closePath(); ctx.stroke();
      var cls2 = classes.find(function(cl){return cl.id===activeClassId;});
      var st = cls2 && cls2.students ? cls2.students.find(function(s){return s.cardNum===cardNum;}) : null;
      ctx.fillStyle = col; ctx.font = 'bold 14px Outfit';
      ctx.fillText((st?st.name:'#'+cardNum)+': '+ans, c[0].x, c[0].y-6);
    });
    if (newFound) {
      renderDet();
      var now = Date.now();
      if (now - lastPush > 800) { pushScan(); lastPush = now; }
    }
  } catch(e) { dbg('scan err: '+e.message); }
  requestAnimationFrame(scanLoop);
}

var debugLines = [];
function dbg(msg) {
  debugLines.push(msg);
  if (debugLines.length > 8) debugLines.shift();
  var p = document.getElementById('debug-panel');
  p.innerHTML = debugLines.join('<br>');
}
function toggleDebug() { var p=document.getElementById('debug-panel'); p.style.display=p.style.display==='block'?'none':'block'; }
function toast(msg) { var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2500); }

renderDet();
</script>
